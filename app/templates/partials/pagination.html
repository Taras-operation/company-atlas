{% if pagination.pages > 1 %}
<div class="pagination">
  {% if pagination.has_prev %}
    <a href="{{ url_for(request.endpoint, page=pagination.prev_num, **request.args) }}" class="btn btn-secondary btn-sm">← Попередня</a>
  {% else %}
    <span class="btn btn-secondary btn-sm disabled">← Попередня</span>
  {% endif %}

  <span class="pagination-info">
    Сторінка {{ pagination.page }} з {{ pagination.pages }} · {{ pagination.total }} записів
  </span>

  {% if pagination.has_next %}
    <a href="{{ url_for(request.endpoint, page=pagination.next_num, **request.args) }}" class="btn btn-secondary btn-sm">Наступна →</a>
  {% else %}
    <span class="btn btn-secondary btn-sm disabled">Наступна →</span>
  {% endif %}
</div>
{% endif %}
