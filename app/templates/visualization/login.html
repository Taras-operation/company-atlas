<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Atlas — Вхід</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #030a17;
      color: #E2E8F0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* ambient glows */
    body::before, body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      z-index: 0;
    }
    body::before { width: 520px; height: 520px; background: rgba(37,99,235,0.35); top: -160px; left: -120px; }
    body::after  { width: 460px; height: 460px; background: rgba(16,185,129,0.20); bottom: -180px; right: -120px; }

    .bg-lines { position: absolute; inset: 0; z-index: 0; opacity: 0.5; }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      margin: 24px;
      padding: 34px 32px 30px;
      background: rgba(9, 18, 33, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 22px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(18px);
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
    .brand-logo {
      width: 42px; height: 42px; border-radius: 13px;
      background: linear-gradient(135deg, #3B82F6, #22C55E);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px; color: #fff;
      box-shadow: 0 6px 20px rgba(59,130,246,0.4);
    }
    .brand-title { font-size: 16px; font-weight: 800; letter-spacing: 0.01em; }
    .brand-sub { font-size: 11px; color: #64748B; margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }

    h1 { font-size: 21px; font-weight: 800; margin-bottom: 6px; }
    .lead { font-size: 13px; color: #8CA0B8; margin-bottom: 22px; line-height: 1.5; }

    label { display: block; font-size: 12px; font-weight: 600; color: #94A3B8; margin: 0 0 7px 2px; }
    .field { margin-bottom: 15px; }
    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      color: #E2E8F0;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      outline: none;
      transition: border-color 120ms, box-shadow 120ms;
    }
    input::placeholder { color: #475569; }
    input:focus { border-color: rgba(59,130,246,0.6); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }

    button.submit {
      width: 100%;
      margin-top: 6px;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 80ms, opacity 120ms, box-shadow 150ms;
      box-shadow: 0 10px 26px rgba(37,99,235,0.35);
    }
    button.submit:hover { box-shadow: 0 12px 30px rgba(37,99,235,0.5); }
    button.submit:active { transform: translateY(1px); }
    button.submit:disabled { opacity: 0.6; cursor: default; box-shadow: none; }

    .error {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      font-size: 13px;
      color: #FCA5A5;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 10px;
    }
    .error.show { display: block; }

    .foot { margin-top: 22px; font-size: 12px; color: #475569; text-align: center; }
    .foot a { color: #60A5FA; text-decoration: none; font-weight: 600; }
    .foot a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <svg class="bg-lines" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke-linecap="round">
      <circle cx="720" cy="450" r="150" stroke="#1E3A5F" stroke-width="2"/>
      <circle cx="720" cy="450" r="250" stroke="#16324f" stroke-width="2"/>
      <circle cx="720" cy="450" r="360" stroke="#122a41" stroke-width="2"/>
      <path d="M720 450 L1180 190" stroke="#1E3A5F" stroke-width="3"/>
      <path d="M720 450 L260 690" stroke="#1E3A5F" stroke-width="3"/>
      <path d="M720 450 L1150 720" stroke="#153b2e" stroke-width="3"/>
      <circle cx="1180" cy="190" r="7" fill="#3B82F6"/>
      <circle cx="260" cy="690" r="7" fill="#3B82F6"/>
      <circle cx="1150" cy="720" r="7" fill="#22C55E"/>
      <circle cx="720" cy="450" r="10" fill="#fff" opacity="0.85"/>
    </g>
  </svg>

  <div class="card">
    <div class="brand">
      <div class="brand-logo">CA</div>
      <div>
        <div class="brand-title">Company Atlas</div>
        <div class="brand-sub">CRM Візуалізація</div>
      </div>
    </div>

    <h1>Вхід</h1>
    <p class="lead">Увійдіть, щоб переглянути структуру компанії, зв'язки та відділи.</p>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="username">Логін</label>
        <input id="username" name="username" type="text" placeholder="Ваш логін" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="submit" type="submit" id="submitBtn">Увійти</button>
      <div class="error" id="error"></div>
    </form>

    <div class="foot">
      Адміністратор? <a href="{{ url_for('auth.login') }}">Увійти в панель</a>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('loginForm');
      var btn = document.getElementById('submitBtn');
      var err = document.getElementById('error');

      function showError(msg) { err.textContent = msg; err.classList.add('show'); }
      function clearError() { err.textContent = ''; err.classList.remove('show'); }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearError();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        if (!username || !password) { showError('Введіть логін і пароль'); return; }

        btn.disabled = true;
        var original = btn.textContent;
        btn.textContent = 'Вхід…';

        fetch('/api/visualization-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password }),
        })
          .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
          .then(function (res) {
            if (res.ok && res.d && res.d.success) {
              window.location.href = '/visualization/';
            } else {
              showError((res.d && res.d.message) || 'Невірний логін або пароль');
              btn.disabled = false; btn.textContent = original;
            }
          })
          .catch(function () {
            showError('Помилка з’єднання. Спробуйте ще раз.');
            btn.disabled = false; btn.textContent = original;
          });
      });
    })();
  </script>
</body>
</html>
