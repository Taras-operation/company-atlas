databases:
  - name: company-crm-db
    plan: free
    databaseName: company_crm
    user: company_crm

services:
  - type: web
    name: company-crm
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "flask --app wsgi.py reset-db && flask --app wsgi.py seed-admin && gunicorn wsgi:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: company-crm-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
